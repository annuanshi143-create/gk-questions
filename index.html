<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GK Battle Arena Pro</title>
    <style>
        :root { --blue: #00f2ff; --purple: #bc13fe; --dark: #050505; }
        body { 
            margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: radial-gradient(circle, #1a1a2e 0%, #050505 100%);
            color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 95%; max-width: 750px; margin-top: 20px; }
        .card { 
            background: rgba(255,255,255,0.08); backdrop-filter: blur(15px); padding: 25px; 
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        /* Header */
        .q-eng { font-size: 1.5rem; color: var(--blue); margin-bottom: 5px; font-weight: bold; }
        .q-hin { font-size: 1.3rem; color: #ddd; margin-bottom: 25px; border-left: 4px solid var(--purple); padding-left: 12px; }

        /* Options */
        .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .opt { 
            padding: 18px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.2); 
            background: rgba(255,255,255,0.05); cursor: pointer; transition: 0.2s; text-align: center; font-size: 1.2rem;
        }
        
        /* User Requirement: Fixed Colors */
        .correct { background: #27ae60 !important; border-color: #2ecc71 !important; color: white !important; font-weight: bold; box-shadow: 0 0 15px #27ae60; }
        .wrong { background: #c0392b !important; border-color: #e74c3c !important; color: white !important; box-shadow: 0 0 15px #c0392b; }

        /* Navigation */
        .nav-btns { display: flex; justify-content: space-between; margin-top: 30px; gap: 10px; }
        button { padding: 15px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; font-family: inherit; }
        .btn-nav { background: #34495e; color: white; flex: 1; font-size: 1rem; }
        .btn-finish { background: var(--purple); color: white; width: 100%; margin-top: 20px; font-size: 1.1rem; box-shadow: 0 0 15px var(--purple); }
        
        #score-display { font-size: 1.3rem; color: #f1c40f; margin-bottom: 10px; font-weight: bold; text-align: center; }
        #res-area { display: none; text-align: center; }
        .score-big { font-size: 6rem; color: var(--blue); margin: 20px 0; text-shadow: 0 0 20px var(--blue); }
    </style>
</head>
<body>

<div class="container">
    <div id="home-screen" class="card" style="text-align:center">
        <h1 style="color:var(--blue); letter-spacing: 2px;">BATTLE ARENA</h1>
        <p>Sawal load ho rahe hain, kripya intezar karein...</p>
        <button id="start-btn" class="btn-finish" onclick="startQuiz()" style="display:none">START QUIZ</button>
    </div>

    <div id="quiz-area" style="display: none;">
        <div id="score-display">Live Score: <span id="cur-score">0</span></div>
        <div class="card">
            <div class="q-eng" id="eng-txt"></div>
            <div class="q-hin" id="hin-txt"></div>
            <div id="options-box" class="opt-grid"></div>
            
            <div class="nav-btns">
                <button class="btn-nav" onclick="nav(-1)">◀ BACK</button>
                <button class="btn-nav" onclick="nav(1)">NEXT ▶</button>
            </div>
            <button class="btn-finish" onclick="finish()">FINISH & SHOW RESULT</button>
        </div>
    </div>

    <div id="res-area" class="card">
        <h2 style="color:var(--purple)">GAME OVER</h2>
        <p>Aapka Total Score:</p>
        <div class="score-big" id="final-score">0</div>
        <button class="btn-nav" style="width: 100%;" onclick="location.reload()">HOME PAR JAYEIN</button>
    </div>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTuO6tzs1vDS-ZpLarL9ElAg4KMFAGXemXvBYb6LIsBvDhCaXVmHaeGV_TJqv7r9pJm__61Hwzv9s1q/pub?gid=946363742&single=true&output=csv';
    
    let allData = [];
    let currentIdx = 0;
    let score = 0;
    let memory = {};

    async function loadSheet() {
        try {
            const res = await fetch(CSV_URL);
            const text = await res.text();
            // Fixing CSV parsing issues
            const rows = text.split(/\r?\n/).slice(1);
            allData = rows.map(r => {
                const c = r.split(',').map(item => item.trim().replace(/^"|"$/g, ''));
                return { e: c[0], h: c[1], o: [c[2], c[3], c[4], c[5]], a: c[6] };
            }).filter(q => q.e);
            
            document.querySelector('#home-screen p').innerText = "Data Loaded Successfully!";
            document.getElementById('start-btn').style.display = 'block';
        } catch (err) {
            document.querySelector('#home-screen p').innerText = "Link error! Check Publish Settings.";
        }
    }

    function startQuiz() {
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        render();
    }

    function render() {
        const q = allData[currentIdx];
        document.getElementById('eng-txt').innerText = q.e;
        document.getElementById('hin-txt').innerText = q.h;
        const box = document.getElementById('options-box');
        box.innerHTML = "";

        q.o.forEach(opt => {
            const div = document.createElement('div');
            div.className = 'opt';
            div.innerText = opt;

            if(memory[currentIdx]) {
                const userChoice = memory[currentIdx].sel;
                if(opt.toLowerCase() === q.a.toLowerCase()) div.classList.add('correct');
                else if(opt === userChoice) div.classList.add('wrong');
                div.style.pointerEvents = 'none';
            }

            div.onclick = () => {
                if(memory[currentIdx]) return;
                
                // Clean comparison
                const isCorrect = opt.trim().toLowerCase() === q.a.trim().toLowerCase();
                memory[currentIdx] = { sel: opt, status: isCorrect };

                if(isCorrect) {
                    div.classList.add('correct');
                    score++;
                    document.getElementById('cur-score').innerText = score;
                } else {
                    div.classList.add('wrong');
                    Array.from(box.children).forEach(b => {
                        if(b.innerText.trim().toLowerCase() === q.a.trim().toLowerCase()) b.classList.add('correct');
                    });
                }
                Array.from(box.children).forEach(b => b.style.pointerEvents = 'none');
            };
            box.appendChild(div);
        });
    }

    function nav(d) {
        if(currentIdx + d >= 0 && currentIdx + d < allData.length) {
            currentIdx += d;
            render();
        }
    }

    function finish() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('res-area').style.display = 'block';
        document.getElementById('final-score').innerText = score;
    }

    loadSheet();
</script>
</body>
</html>
