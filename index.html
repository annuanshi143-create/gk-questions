<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro GK Battle | 2026</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --dark-bg: #050505;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; font-family: 'Rajdhani', sans-serif;
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at center, #1a1a2e 0%, #050505 100%);
            color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
        }

        /* Hero Section */
        .hero-header {
            width: 100%; padding: 40px 0; text-align: center;
            background: linear-gradient(to bottom, rgba(0,242,255,0.1), transparent);
            border-bottom: 1px solid var(--glass);
        }

        .hero-header h1 { 
            font-size: 3.5rem; margin: 0; letter-spacing: 5px;
            text-transform: uppercase; color: var(--neon-blue);
            text-shadow: 0 0 15px var(--neon-blue);
        }

        /* Timer Bar */
        .timer-container {
            width: 100%; height: 6px; background: #222; position: fixed; top: 0; z-index: 100;
        }
        #timer-bar {
            width: 100%; height: 100%; background: var(--neon-blue);
            box-shadow: 0 0 10px var(--neon-blue); transition: width 0.1s linear;
        }

        .main-content { width: 90%; max-width: 700px; margin-top: -30px; z-index: 2; }

        .quiz-box {
            background: var(--glass); backdrop-filter: blur(20px);
            padding: 40px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Question Styles */
        .q-eng { font-size: 1.5rem; color: var(--neon-blue); margin-bottom: 10px; line-height: 1.4; }
        .q-hin { font-size: 1.3rem; color: #ccc; margin-bottom: 30px; font-weight: 300; }

        /* Options Grid */
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .option-card {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
            padding: 20px; border-radius: 15px; cursor: pointer; transition: 0.3s;
            font-size: 1.1rem; text-align: center; position: relative; overflow: hidden;
        }
        .option-card:hover { 
            background: rgba(0,242,255,0.1); border-color: var(--neon-blue);
            transform: translateY(-5px);
        }

        .correct { background: #00ff8822 !important; border-color: #00ff88 !important; color: #00ff88; }
        .wrong { background: #ff444422 !important; border-color: #ff4444 !important; color: #ff4444; }

        /* Result Screen */
        .result-panel { display: none; text-align: center; }
        .score-circle {
            width: 200px; height: 200px; border: 10px solid var(--neon-purple);
            border-radius: 50%; margin: 30px auto; display: flex; 
            align-items: center; justify-content: center; font-size: 3rem;
            box-shadow: 0 0 30px var(--neon-purple);
        }

        /* Floating Stats */
        .stats-bar {
            display: flex; justify-content: space-between; width: 100%;
            margin-bottom: 15px; font-size: 1.1rem; color: var(--neon-purple);
        }

        @media (max-width: 600px) { .options-grid { grid-template-columns: 1fr; } }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="timer-container"><div id="timer-bar"></div></div>

    <div class="hero-header">
        <h1>GK BATTLE ARENA</h1>
    </div>

    <div class="main-content">
        <div id="setup-area">
            <div class="quiz-box" style="text-align: center;">
                <h2 style="color: var(--neon-purple);">Vishay Chunein / Select Subject</h2>
                <select id="subject-sel" style="width: 80%; padding: 15px; border-radius: 10px; background: #111; color: white; border: 1px solid var(--neon-blue); font-size: 1.1rem;">
                    <option value="All">Mix Questions</option>
                    <option value="GK">General Knowledge</option>
                    <option value="Math">Mathematics</option>
                    <option value="Hindi">Hindi Grammar</option>
                    <option value="Science">Science</option>
                </select>
                <br><br>
                <button onclick="initGame()" style="padding: 15px 40px; border-radius: 50px; background: var(--neon-blue); border: none; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px var(--neon-blue);">START BATTLE</button>
            </div>
        </div>

        <div id="game-area" style="display: none;">
            <div class="stats-bar">
                <span id="stat-q">Q: 1/10</span>
                <span id="stat-score">Score: 0</span>
            </div>
            <div class="quiz-box">
                <div class="q-eng" id="txt-eng"></div>
                <div class="q-hin" id="txt-hin"></div>
                <div class="options-grid" id="opt-grid"></div>
            </div>
        </div>

        <div id="result-area" class="result-panel quiz-box">
            <h1 style="color: var(--neon-blue);">MISSION COMPLETE</h1>
            <div class="score-circle" id="final-res">0/20</div>
            <p id="rank-text" style="font-size: 1.5rem;"></p>
            <button onclick="location.reload()" style="padding: 15px 40px; border-radius: 50px; background: var(--neon-purple); border: none; color: white; cursor: pointer;">REBOOT SYSTEM</button>
        </div>
    </div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTuO6tzs1vDS-ZpLarL9ElAg4KMFAGXemXvBYb6LIsBvDhCaXVmHaeGV_TJqv7r9pJm__61Hwzv9s1q/pub?gid=946363742&single=true&output=csv';
    let rawData = [];
    let gamePool = [];
    let qIndex = 0;
    let totalScore = 0;
    let timerInterval;
    let timeLeft = 100;

    async function fetchData() {
        const response = await fetch(SHEET_URL);
        const data = await response.text();
        const rows = data.split('\n').slice(1);
        rawData = rows.map(r => {
            const c = r.split(',');
            return { eng: c[0], hin: c[1], opts: [c[2], c[3], c[4], c[5]], ans: c[6]?.trim(), sub: c[7]?.trim() };
        }).filter(x => x.eng);
    }

    function initGame() {
        const sub = document.getElementById('subject-sel').value;
        gamePool = sub === "All" ? rawData : rawData.filter(x => x.sub === sub);
        gamePool = gamePool.sort(() => 0.5 - Math.random()).slice(0, 20);
        
        document.getElementById('setup-area').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';
        loadQ();
    }

    function startTimer() {
        timeLeft = 100;
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft -= 0.5;
            document.getElementById('timer-bar').style.width = timeLeft + "%";
            if(timeLeft <= 0) {
                clearInterval(timerInterval);
                autoSkip();
            }
        }, 100);
    }

    function loadQ() {
        if(qIndex >= gamePool.length) return endBatch();
        startTimer();
        const q = gamePool[qIndex];
        document.getElementById('txt-eng').innerText = q.eng;
        document.getElementById('txt-hin').innerText = q.hin;
        document.getElementById('stat-q').innerText = `Question: ${qIndex + 1}/20`;
        
        const grid = document.getElementById('opt-grid');
        grid.innerHTML = "";
        q.opts.forEach(o => {
            const div = document.createElement('div');
            div.className = 'option-card';
            div.innerText = o;
            div.onclick = () => validate(div, o, q.ans);
            grid.appendChild(div);
        });
    }

    function validate(el, sel, cor) {
        clearInterval(timerInterval);
        const cards = document.querySelectorAll('.option-card');
        cards.forEach(c => c.style.pointerEvents = 'none');

        if(sel.trim() === cor.trim()) {
            el.classList.add('correct');
            totalScore++;
            document.getElementById('stat-score').innerText = `Score: ${totalScore}`;
        } else {
            el.classList.add('wrong');
            cards.forEach(c => { if(c.innerText.trim() === cor.trim()) c.classList.add('correct'); });
        }
        setTimeout(() => { qIndex++; loadQ(); }, 1500);
    }

    function autoSkip() {
        qIndex++;
        loadQ();
    }

    function endBatch() {
        document.getElementById('game-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        document.getElementById('final-res').innerText = `${totalScore}/20`;
        const rank = totalScore > 15 ? "PRO GAMER 🏆" : totalScore > 10 ? "ELITE SOLDIER" : "TRAINEE";
        document.getElementById('rank-text').innerText = "RANK: " + rank;
    }

    fetchData();
</script>
</body>
</html>
