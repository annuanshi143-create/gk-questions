<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subject-Wise GK Game</title>
    <style>
        /* Background aur Gaming Look */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); 
            color: white;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; padding: 20px;
        }
        .container { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(10px);
            padding: 30px; border-radius: 20px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            width: 100%; max-width: 600px; text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        select {
            width: 100%; padding: 12px; margin-bottom: 20px;
            border-radius: 8px; border: none; font-size: 16px; background: #fff;
        }
        .option-btn { 
            display: block; width: 100%; padding: 15px; margin: 10px 0;
            background: rgba(255, 255, 255, 0.9); color: #333;
            border: none; border-radius: 10px; cursor: pointer;
            font-size: 17px; transition: 0.3s; font-weight: 500;
        }
        .option-btn:hover { background: #ffd700; transform: scale(1.02); }
        .correct { background: #2ecc71 !important; color: white; }
        .wrong { background: #e74c3c !important; color: white; }
        #next-btn { 
            margin-top: 20px; padding: 12px 30px; 
            background: #ffd700; color: #333; border: none;
            border-radius: 50px; font-weight: bold; cursor: pointer; display: none;
        }
        #score-board { font-size: 20px; margin-bottom: 15px; color: #ffd700; }
    </style>
</head>
<body>

    <div id="score-board">Total Score: 0</div>

    <div class="container">
        <h2>📚 Quiz Master 2.0</h2>
        
        <label for="subject-select">Apna Vishay Chunein:</label>
        <select id="subject-select" onchange="filterSubject()">
            <option value="All">Sabhi Vishay (Mix)</option>
            <option value="Hindi">Hindi</option>
            <option value="Math">Math</option>
            <option value="Science">Science</option>
            <option value="GK">General Knowledge</option>
        </select>

        <div id="quiz-area">
            <h3 id="q-text">Sawal Load Ho Rahe Hain...</h3>
            <div id="options-box"></div>
            <button id="next-btn" onclick="showNext()">Agla Sawal ➔</button>
        </div>
    </div>

<script>
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTuO6tzs1vDS-ZpLarL9ElAg4KMFAGXemXvBYb6LIsBvDhCaXVmHaeGV_TJqv7r9pJm__61Hwzv9s1q/pub?gid=946363742&single=true&output=csv'; // Apni Link Yahan Dalein

    let allData = [];
    let filteredQuestions = [];
    let currentScore = 0;

    async function fetchData() {
        const res = await fetch(SHEET_CSV_URL);
        const text = await res.text();
        const rows = text.split('\n').slice(1);
        
        allData = rows.map(r => {
            const c = r.split(',');
            return { q: c[0], opts: [c[1], c[2], c[3], c[4]], ans: c[5]?.trim(), sub: c[6]?.trim() };
        }).filter(x => x.q);

        filterSubject();
    }

    function filterSubject() {
        const selectedSub = document.getElementById('subject-select').value;
        if(selectedSub === "All") {
            filteredQuestions = allData;
        } else {
            filteredQuestions = allData.filter(item => item.sub === selectedSub);
        }
        showNext();
    }

    function showNext() {
        if(filteredQuestions.length === 0) {
            document.getElementById('q-text').innerText = "Is vishay mein koi sawal nahi hai!";
            document.getElementById('options-box').innerHTML = "";
            return;
        }

        const randomQ = filteredQuestions[Math.floor(Math.random() * filteredQuestions.length)];
        document.getElementById('q-text').innerText = randomQ.q;
        document.getElementById('next-btn').style.display = "none";
        
        const box = document.getElementById('options-box');
        box.innerHTML = "";

        randomQ.opts.forEach(opt => {
            const b = document.createElement('button');
            b.className = 'option-btn';
            b.innerText = opt;
            b.onclick = () => {
                const allButtons = document.querySelectorAll('.option-btn');
                allButtons.forEach(btn => btn.style.pointerEvents = "none");

                if(opt.trim() === randomQ.ans) {
                    b.classList.add('correct');
                    currentScore += 10;
                    document.getElementById('score-board').innerText = `Total Score: ${currentScore}`;
                } else {
                    b.classList.add('wrong');
                    allButtons.forEach(btn => {
                        if(btn.innerText.trim() === randomQ.ans) btn.classList.add('correct');
                    });
                }
                document.getElementById('next-btn').style.display = "inline-block";
            };
            box.appendChild(b);
        });
    }

    fetchData();
</script>
</body>
</html>
