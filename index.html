<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School GK Gaming Portal</title>
    <style>
        /* CSS Section: Professional & Gaming Look */
        body {
            background-color: #eef2f3;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .quiz-container {
            background: #ffffff;
            width: 90%;
            max-width: 500px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 { color: #2c3e50; margin-bottom: 20px; }

        .btn-grid { display: flex; flex-direction: column; gap: 10px; }

        .cat-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 15px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px #1e8449;
        }

        .cat-btn:hover { background: #2ecc71; }
        .cat-btn:active { box-shadow: 0 0; transform: translateY(4px); }

        ul { list-style: none; padding: 0; text-align: left; }
        li {
            background: #f8f9fa;
            margin: 10px 0;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            cursor: pointer;
        }

        input[type="radio"] { margin-right: 10px; cursor: pointer; }

        #submit {
            width: 100%;
            padding: 15px;
            background: #2980b9;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 15px;
        }

        .score-item {
            background: #d4edda;
            padding: 8px;
            margin: 5px 0;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

<div class="quiz-container" id="main-box">
    <div id="class-screen">
        <h2>Apni Class Chunein</h2>
        <div class="btn-grid">
            <button class="cat-btn" onclick="selectClass('primary')">Class 1 - 5 (Primary)</button>
            <button class="cat-btn" onclick="selectClass('junior')">Class 6 - 8 (Junior)</button>
        </div>
    </div>

    <div id="subject-screen" style="display: none;">
        <h2 id="class-title">Subject Chunein</h2>
        <div class="btn-grid">
            <button class="cat-btn" onclick="startQuiz('GK')">General Knowledge</button>
            <button class="cat-btn" onclick="startQuiz('Science')">Science</button>
            <button class="cat-btn" onclick="startQuiz('Maths')">Maths</button>
            <button onclick="location.reload()" style="background:gray; border:none; color:white; padding:10px; border-radius:5px; cursor:pointer;">Back</button>
        </div>
    </div>

    <div id="quiz-screen" style="display: none;">
        <h3 id="question-text">Sawal yahan aayega</h3>
        <ul>
            <li><label><input type="radio" name="ans" id="a_opt"> <span id="a_text"></span></label></li>
            <li><label><input type="radio" name="ans" id="b_opt"> <span id="b_text"></span></label></li>
            <li><label><input type="radio" name="ans" id="c_opt"> <span id="c_text"></span></label></li>
            <li><label><input type="radio" name="ans" id="d_opt"> <span id="d_text"></span></label></li>
        </ul>
        <button id="submit">Next Question</button>
    </div>

    <div id="result-screen" style="display: none;">
        <h2>Quiz Result</h2>
        <h3 id="final-score"></h3>
        <div id="leaderboard">
            <h4>Top 5 Performers:</h4>
            <div id="score-list"></div>
        </div>
        <button class="cat-btn" onclick="location.reload()" style="margin-top:20px; width:100%;">Home Par Jayein</button>
    </div>
</div>

<script>
    // Database: Aap yahan aur sawal add kar sakte hain
    const quizData = {
        primary: {
            GK: [{ q: "India ka Rashtriya Pashu?", a: "Sher", b: "Baagh", c: "Hathi", d: "Ghoda", correct: "b" }],
            Science: [{ q: "Paani ka rang kaisa hota hai?", a: "Neela", b: "Safed", c: "Rangheen", d: "Hara", correct: "c" }],
            Maths: [{ q: "5 x 4 kitna hota hai?", a: "20", b: "25", c: "15", d: "10", correct: "a" }]
        },
        junior: {
            GK: [{ q: "UP ke Mukhya Mantri kaun hain?", a: "Modi ji", b: "Yogi ji", c: "Akhilesh ji", d: "Mayawati ji", correct: "b" }],
            Science: [{ q: "Insaan ke shareer mein kitni haddiyan hoti hain?", a: "200", b: "206", c: "210", d: "180", correct: "b" }],
            Maths: [{ q: "Square ki kitni sides hoti hain?", a: "3", b: "4", c: "5", d: "6", correct: "b" }]
        }
    };

    let selectedClass = "";
    let currentQuestions = [];
    let currentIdx = 0;
    let score = 0;

    function selectClass(cls) {
        selectedClass = cls;
        document.getElementById('class-screen').style.display = 'none';
        document.getElementById('subject-screen').style.display = 'block';
        document.getElementById('class-title').innerText = "Class: " + (cls==='primary'?'1-5':'6-8');
    }

    function startQuiz(sub) {
        currentQuestions = quizData[selectedClass][sub];
        document.getElementById('subject-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        const q = currentQuestions[currentIdx];
        document.getElementById('question-text').innerText = q.q;
        document.getElementById('a_text').innerText = q.a;
        document.getElementById('b_text').innerText = q.b;
        document.getElementById('c_text').innerText = q.c;
        document.getElementById('d_text').innerText = q.d;
        resetRadios();
    }

    function resetRadios() {
        document.querySelectorAll('input[name="ans"]').forEach(el => el.checked = false);
    }

    document.getElementById('submit').addEventListener('click', () => {
        const selected = document.querySelector('input[name="ans"]:checked');
        if (!selected) return alert("Pehle ek option chunein!");

        const ansKey = selected.id.split('_')[0]; // a, b, c, or d
        if (ansKey === currentQuestions[currentIdx].correct) score++;

        currentIdx++;
        if (currentIdx < currentQuestions.length) {
            showQuestion();
        } else {
            finishQuiz();
        }
    });

    function finishQuiz() {
        const name = prompt("Aapne Quiz poori ki! Apna naam likhiye:");
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = `Score: ${score} / ${currentQuestions.length}`;
        
        saveAndShowLeaderboard(name || "Anjaan");
    }

    function saveAndShowLeaderboard(name) {
        let scores = JSON.parse(localStorage.getItem('schoolScores')) || [];
        scores.push({name: name, score: score});
        scores.sort((a,b) => b.score - a.score);
        scores = scores.slice(0, 5); // Top 5
        localStorage.setItem('schoolScores', JSON.stringify(scores));

        const list = document.getElementById('score-list');
        list.innerHTML = scores.map(s => `
            <div class="score-item"><span>${s.name}</span> <span>${s.score} pts</span></div>
        `).join('');
    }
</script>

</body>
</html>
