<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional GK Quiz Portal</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #27ae60;
            --accent: #e74c3c;
            --light: #ecf0f1;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #f4f4f4;
        }

        /* Header & Logo */
        header {
            background: white;
            padding: 10px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .logo img { height: 60px; }

        /* Hero Banner */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .hero h1 { font-size: 3rem; margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }

        /* Main Container */
        .container {
            max-width: 900px;
            margin: -50px auto 50px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            position: relative;
        }

        .subject-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .btn {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        /* Quiz UI */
        #quiz-area { display: none; }
        .option-list { list-style: none; padding: 0; }
        .option-list li {
            background: #f8f9fa;
            margin: 10px 0;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #ddd;
            cursor: pointer;
            transition: 0.2s;
        }
        .option-list li:hover { border-color: var(--secondary); background: #e8f5e9; }

        /* Leaderboard */
        .leaderboard { margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; }
        .score-row { display: flex; justify-content: space-between; padding: 10px; background: #fdfdfd; border-bottom: 1px solid #eee; }

        /* Footer */
        footer {
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 50px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <img src="https://via.placeholder.com/150x60?text=SCHOOL+LOGO" alt="School Logo">
    </div>
    <div class="contact">Support: school@email.com</div>
</header>

<div class="hero">
    <h1>GK Gaming World</h1>
    <p>Apna Vishay Chunein aur Knowledge Badhayein!</p>
</div>

<div class="container" id="main-container">
    <div id="subject-screen">
        <h2>Subjects</h2>
        <div class="subject-grid">
            <button class="btn" onclick="startQuiz('GK')">General Knowledge</button>
            <button class="btn" onclick="startQuiz('Science')">Science</button>
            <button class="btn" onclick="startQuiz('History')">History</button>
            <button class="btn" onclick="startQuiz('Computer')">Computer</button>
        </div>
    </div>

    <div id="quiz-area">
        <h2 id="q-text">Sawal yahan aayega?</h2>
        <ul class="option-list" id="options"></ul>
        <div id="stat-bar">Sawal: <span id="q-count">0</span> / 10</div>
    </div>

    <div class="leaderboard">
        <h3>🏆 Top Students</h3>
        <div id="leaderboard-data"></div>
    </div>
</div>

<footer>
    <p>&copy; 2026 Shree Shiv Samaj Kalyan Prathamik Viddyalay | All Rights Reserved</p>
</footer>

<script>
    // Note: 500+ questions add karne ke liye aap is array ko extend kar sakte hain.
    const questionsDB = {
        GK: [
            {q: "Bharat ka Rashtriya Gaan kisne likha?", a: "Nehru", b: "Tagore", c: "Gandhi", d: "Azad", ans: "b"},
            {q: "Vishwa ka sabse bada registan?", a: "Thar", b: "Gobi", c: "Sahara", d: "Atacama", ans: "c"}
            // Yahan aap aise hi 500 questions add kar sakte hain
        ],
        Science: [
            {q: "Paani ka boiling point?", a: "50C", b: "100C", c: "150C", d: "200C", ans: "b"},
            {q: "Insan ke dil mein kitne chamber hote hain?", a: "2", b: "3", c: "4", d: "1", ans: "c"}
        ],
        History: [
            {q: "Bharat kab azad hua?", a: "1942", b: "1947", c: "1950", d: "1930", ans: "b"}
        ],
        Computer: [
            {q: "WWW ka full form?", a: "World Wide Web", b: "Word Wide Web", c: "Web World Wide", d: "Wrestling World", ans: "a"}
        ]
    };

    let currentSubject = "";
    let score = 0;
    let index = 0;
    let studentName = "";

    function startQuiz(sub) {
        studentName = prompt("Apna Naam Likhiye:");
        if(!studentName) return alert("Naam likhna zaroori hai!");
        
        currentSubject = sub;
        score = 0;
        index = 0;
        document.getElementById('subject-screen').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        loadQuestion();
    }

    function loadQuestion() {
        const data = questionsDB[currentSubject][index];
        if(!data) return endQuiz();

        document.getElementById('q-text').innerText = data.q;
        document.getElementById('q-count').innerText = index + 1;
        const opts = document.getElementById('options');
        opts.innerHTML = `
            <li onclick="check('a')">${data.a}</li>
            <li onclick="check('b')">${data.b}</li>
            <li onclick="check('c')">${data.c}</li>
            <li onclick="check('d')">${data.d}</li>
        `;
    }

    function check(choice) {
        if(choice === questionsDB[currentSubject][index].ans) score++;
        index++;
        loadQuestion();
    }

    function endQuiz() {
        alert(`${studentName}, aapka score: ${score}`);
        saveScore(studentName, score);
        location.reload();
    }

    function saveScore(n, s) {
        let scores = JSON.parse(localStorage.getItem('gk_ranks')) || [];
        scores.push({name: n, score: s, date: new Date().toLocaleDateString()});
        scores.sort((a,b) => b.score - a.score);
        localStorage.setItem('gk_ranks', JSON.stringify(scores.slice(0, 10)));
    }

    function showLeaderboard() {
        const scores = JSON.parse(localStorage.getItem('gk_ranks')) || [];
        const div = document.getElementById('leaderboard-data');
        div.innerHTML = scores.map(s => `
            <div class="score-row">
                <span><b>${s.name}</b></span>
                <span>${s.score} Points</span>
                <small>${s.date}</small>
            </div>
        `).join('');
    }

    showLeaderboard();
</script>

</body>
</html>
