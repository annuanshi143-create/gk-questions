<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GK Battle Arena</title>
    <style>
        :root { --blue: #00f2ff; --purple: #bc13fe; }
        body { 
            margin: 0; font-family: sans-serif; 
            background: #050505; background-image: radial-gradient(#1a1a2e, #050505);
            color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 95%; max-width: 700px; margin-top: 30px; }
        .card { 
            background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); padding: 25px; 
            border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);
        }
        .q-eng { font-size: 1.4rem; color: var(--blue); margin-bottom: 5px; font-weight: bold; }
        .q-hin { font-size: 1.2rem; color: #ccc; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .opt { 
            padding: 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); 
            background: rgba(255,255,255,0.05); cursor: pointer; text-align: center;
        }
        .correct { background: #27ae60 !important; border-color: #2ecc71 !important; }
        .wrong { background: #c0392b !important; border-color: #e74c3c !important; }
        .nav { display: flex; justify-content: space-between; margin-top: 20px; gap: 10px; }
        button { padding: 12px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; }
        .btn-p { background: var(--purple); color: white; width: 100%; margin-top: 15px; }
        @media (max-width: 500px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div id="setup" class="card" style="text-align:center">
        <h2>BATTLE ARENA</h2>
        <button class="btn-p" onclick="start()">START GAME</button>
    </div>

    <div id="quiz" style="display:none">
        <div style="margin-bottom:10px; color:var(--blue)">Score: <span id="sc">0</span></div>
        <div class="card">
            <div class="q-eng" id="eng"></div>
            <div class="q-hin" id="hin"></div>
            <div id="opts" class="grid"></div>
            <div class="nav">
                <button onclick="move(-1)" style="background:#444; color:white; flex:1">BACK</button>
                <button onclick="move(1)" style="background:#444; color:white; flex:1">NEXT</button>
            </div>
            <button class="btn-p" onclick="showRes()">FINISH</button>
        </div>
    </div>

    <div id="res" class="card" style="display:none; text-align:center">
        <h1>SCORE: <span id="fsc">0</span></h1>
        <button onclick="location.reload()" class="btn-p">RESTART</button>
    </div>
</div>

<script>
    // Link Updated to TSV for better accuracy
    const URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTuO6tzs1vDS-ZpLarL9ElAg4KMFAGXemXvBYb6LIsBvDhCaXVmHaeGV_TJqv7r9pJm__61Hwzv9s1q/pub?gid=946363742&single=true&output=tsv';
    
    let data = [], cur = 0, score = 0, memory = {};

    async function load() {
        const r = await fetch(URL);
        const t = await r.text();
        const rows = t.split('\n').slice(1);
        data = rows.map(row => {
            const c = row.split('\t'); // Tab based splitting
            return { e: c[0], h: c[1], o: [c[2], c[3], c[4], c[5]], a: c[6]?.trim() };
        }).filter(x => x.e);
    }

    function start() {
        document.getElementById('setup').style.display='none';
        document.getElementById('quiz').style.display='block';
        render();
    }

    function render() {
        const q = data[cur];
        document.getElementById('eng').innerText = q.e;
        document.getElementById('hin').innerText = q.h;
        const box = document.getElementById('opts');
        box.innerHTML = "";
        q.o.forEach(opt => {
            const d = document.createElement('div');
            d.className = 'opt';
            d.innerText = opt;
            if(memory[cur]) {
                if(opt.trim() === q.a) d.classList.add('correct');
                else if(opt === memory[cur]) d.classList.add('wrong');
                d.style.pointerEvents = 'none';
            }
            d.onclick = () => {
                if(memory[cur]) return;
                memory[cur] = opt;
                if(opt.trim() === q.a) { d.classList.add('correct'); score++; document.getElementById('sc').innerText=score; }
                else { 
                    d.classList.add('wrong'); 
                    Array.from(box.children).forEach(b => { if(b.innerText.trim() === q.a) b.classList.add('correct'); });
                }
                Array.from(box.children).forEach(b => b.style.pointerEvents = 'none');
            };
            box.appendChild(d);
        });
    }

    function move(d) { if(cur+d>=0 && cur+d<data.length) { cur+=d; render(); } }
    function showRes() {
        document.getElementById('quiz').style.display='none';
        document.getElementById('res').style.display='block';
        document.getElementById('fsc').innerText = score;
    }
    load();
</script>
</body>
</html>
