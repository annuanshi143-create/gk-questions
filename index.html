<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GK Battle Arena | Pro Edition</title>
    <style>
        :root { --neon-blue: #00f2ff; --neon-purple: #bc13fe; --dark-bg: #050505; }
        
        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; 
            background: radial-gradient(circle, #1a1a2e 0%, #050505 100%);
            color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 95%; max-width: 800px; margin-top: 30px; padding-bottom: 50px; }

        /* UI Cards */
        .quiz-card { 
            background: rgba(255,255,255,0.08); backdrop-filter: blur(15px); padding: 30px; 
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        /* Question Styles */
        .q-eng { font-size: 1.5rem; color: var(--neon-blue); margin-bottom: 8px; font-weight: bold; line-height: 1.4; }
        .q-hin { font-size: 1.3rem; color: #ccc; margin-bottom: 25px; border-left: 4px solid var(--neon-purple); padding-left: 15px; }

        /* Options */
        .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .opt { 
            padding: 18px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.2); 
            background: rgba(255,255,255,0.05); cursor: pointer; transition: 0.3s; 
            text-align: left; font-size: 1.1rem;
        }
        .opt:hover { border-color: var(--neon-blue); background: rgba(0,242,255,0.05); }
        
        /* Feedback Colors */
        .correct { background: #27ae60 !important; border-color: #2ecc71 !important; color: white !important; font-weight: bold; }
        .wrong { background: #c0392b !important; border-color: #e74c3c !important; color: white !important; }

        /* Buttons */
        .nav-btns { display: flex; justify-content: space-between; margin-top: 30px; gap: 15px; }
        button { padding: 15px 25px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .btn-nav { background: #34495e; color: white; flex: 1; font-size: 1rem; }
        .btn-finish { background: var(--neon-purple); color: white; width: 100%; margin-top: 20px; font-size: 1.1rem; }

        /* Stats */
        .stats-header { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 1.2rem; font-weight: bold; color: #f1c40f; }
        
        #result-area { display: none; text-align: center; }
        .final-score { font-size: 6rem; color: var(--neon-blue); text-shadow: 0 0 20px var(--neon-blue); margin: 20px 0; }

        select { width: 100%; padding: 15px; margin-top: 20px; border-radius: 10px; background: #111; color: white; border: 1px solid var(--neon-blue); font-size: 1rem; }

        @media (max-width: 600px) { .opt-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-area" class="quiz-card" style="text-align: center;">
        <h1 style="color:var(--neon-blue); letter-spacing: 2px;">GK BATTLE ARENA</h1>
        <p>Apna Vishay Chunein / Select Your Subject</p>
        
        <select id="sub-sel">
            <option value="All">All Subjects (Mixed)</option>
            <option value="GK">General Knowledge</option>
            <option value="Math">Mathematics</option>
            <option value="Hindi">Hindi Grammar</option>
            <option value="Science">Science</option>
        </select>
        
        <button class="btn-finish" onclick="startQuiz()" style="margin-top: 30px;">BATTLE START KAREIN</button>
    </div>

    <div id="game-area" style="display: none;">
        <div class="stats-header">
            <span id="q-count">Q: 1</span>
            <span>Live Score: <span id="live-score">0</span></span>
        </div>
        
        <div class="quiz-card">
            <div class="q-eng" id="txt-eng"></div>
            <div class="q-hin" id="txt-hin"></div>
            
            <div class="opt-grid" id="opt-container"></div>
            
            <div class="nav-btns">
                <button class="btn-nav" onclick="changeQuestion(-1)">◀ BACK</button>
                <button class="btn-nav" onclick="changeQuestion(1)">NEXT ▶</button>
            </div>
            
            <button class="btn-finish" onclick="showResult()">FINISH & SHOW RESULT</button>
        </div>
    </div>

    <div id="result-area" class="quiz-card">
        <h2 style="color:var(--neon-purple)">MISSION COMPLETE</h2>
        <p>Aapka Total Score:</p>
        <div class="final-score" id="final-res">0</div>
        <p id="summary-text"></p>
        <button class="btn-nav" style="width:100%" onclick="location.reload()">HOME PAR JAYEIN</button>
    </div>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTuO6tzs1vDS-ZpLarL9ElAg4KMFAGXemXvBYb6LIsBvDhCaXVmHaeGV_TJqv7r9pJm__61Hwzv9s1q/pub?gid=946363742&single=true&output=csv';
    
    let masterData = [];
    let activeQuestions = [];
    let currentIdx = 0;
    let score = 0;
    let userMemory = {}; // Track user answers

    // 1. Data Load Karein
    async function init() {
        try {
            const response = await fetch(CSV_URL);
            const data = await response.text();
            const rows = data.split('\n').slice(1);
            
            masterData = rows.map((row, i) => {
                const cols = row.split(',').map(c => c.trim());
                return {
                    id: i,
                    eng: cols[0], hin: cols[1],
                    opts: [cols[2], cols[3], cols[4], cols[5]],
                    ans: cols[6], sub: cols[7]
                };
            }).filter(q => q.eng);
            console.log("Sheet Connected!");
        } catch (err) {
            alert("Database connect nahi ho pa raha!");
        }
    }

    // 2. Quiz Start Logic
    function startQuiz() {
        const selectedSub = document.getElementById('sub-sel').value;
        activeQuestions = selectedSub === "All" ? 
            masterData : masterData.filter(q => q.sub === selectedSub);

        // Shuffle Questions
        activeQuestions = activeQuestions.sort(() => 0.5 - Math.random());

        if(activeQuestions.length === 0) {
            alert("Is subject mein sawal nahi hain!");
            return;
        }

        document.getElementById('setup-area').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';
        renderQuestion();
    }

    // 3. Question Dikhaein
    function renderQuestion() {
        const q = activeQuestions[currentIdx];
        document.getElementById('txt-eng').innerText = q.eng;
        document.getElementById('txt-hin').innerText = q.hin;
        document.getElementById('q-count').innerText = `Question: ${currentIdx + 1}/${activeQuestions.length}`;
        
        const container = document.getElementById('opt-container');
        container.innerHTML = "";

        q.opts.forEach(opt => {
            const div = document.createElement('div');
            div.className = 'opt';
            div.innerText = opt;

            // Agar pehle jawab de diya hai, to colors dikhaein
            if(userMemory[currentIdx]) {
                if(opt === q.ans) div.classList.add('correct');
                else if(opt === userMemory[currentIdx].userChoice) div.classList.add('wrong');
                div.style.pointerEvents = 'none';
            }

            div.onclick = () => handleAnswer(div, opt, q.ans);
            container.appendChild(div);
        });
    }

    // 4. Answer Check & Score Update
    function handleAnswer(element, choice, correct) {
        if(userMemory[currentIdx]) return;

        // Clean text for perfect matching
        const cleanChoice = choice.toLowerCase().trim();
        const cleanCorrect = correct.toLowerCase().trim();

        const isCorrect = cleanChoice === cleanCorrect;
        userMemory[currentIdx] = { userChoice: choice, status: isCorrect };

        if(isCorrect) {
            element.classList.add('correct');
            score++;
            document.getElementById('live-score').innerText = score;
        } else {
            element.classList.add('wrong');
            // Sahi jawab ko green karein
            Array.from(document.querySelectorAll('.opt')).forEach(o => {
                if(o.innerText.toLowerCase().trim() === cleanCorrect) o.classList.add('correct');
            });
        }
        
        // Disable clicking
        document.querySelectorAll('.opt').forEach(o => o.style.pointerEvents = 'none');
    }

    // 5. Navigation
    function changeQuestion(step) {
        if(currentIdx + step >= 0 && currentIdx + step < activeQuestions.length) {
            currentIdx += step;
            renderQuestion();
        }
    }

    // 6. Final Result
    function showResult() {
        document.getElementById('game-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        document.getElementById('final-res').innerText = score;
        document.getElementById('summary-text').innerText = `Aapne kul ${activeQuestions.length} mein se ${score} sahi jawab diye.`;
    }

    init();
</script>

</body>
</html>
