<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SS Samaj Kalyan Prathmic Viddyalay - Quiz Portal</title>
    <style>
        :root { --p: #1e3799; --s: #eb2f06; }
        body { margin: 0; font-family: sans-serif; background: #f4f4f4; text-align: center; }
        header { background: white; padding: 10px; border-bottom: 5px solid var(--p); }
        .hero { background: linear-gradient(45deg, var(--p), var(--s)); color: white; padding: 40px 10px; }
        .container { max-width: 800px; margin: -30px auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-top: 20px; }
        .sub-btn { padding: 20px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; background: var(--p); }
        #quiz-box { display: none; padding: 20px; }
        .options { list-style: none; padding: 0; }
        .options li { background: #eee; margin: 10px 0; padding: 15px; border-radius: 8px; cursor: pointer; border: 1px solid #ccc; }
        .options li:hover { background: #ddd; }
        footer { margin-top: 50px; background: var(--p); color: white; padding: 20px; }
    </style>
</head>
<body>

<header>
    <h2>SHREE SHIV SAMAJ KALYAN Prathmic</h2>
    <p> GK Portal</p>
</header>

<div class="hero">
    <h1>Champion Quiz 🏆</h1>
    <p id="load-status">Questions Load Ho Rahe Hain...</p>
</div>

<div class="container">
    <div id="home">
        <h3> select subject :</h3>
        <div class="grid" id="subject-menu">
            </div>
    </div>

    <div id="quiz-box">
        <h2 id="q-text"></h2>
        <ul class="options" id="opt-list"></ul>
        <p>Score: <span id="score">0</span></p>
    </div>
</div>

<footer>© 2026 Admin Portal - Azamgarh</footer>

<script>
    // 1. APNA GOOGLE SHEET CSV LINK YAHAN PASTE KAREIN
    const sheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRD433TB8am9bChCp6xLLHsmJk4V6fuLJw8wRkqz6J0hhvh0H0LafBxAb0yY-i5sSRSQLHtXn5DlpO5/pub?gid=1918837398&single=true&output=csv';

    let allData = [];
    let currentQuestions = [];
    let qIdx = 0, score = 0;

    // Google Sheet se data khichne ka function
    async function loadSheetData() {
        try {
            const response = await fetch(sheetURL);
            const data = await response.text();
            const rows = data.split('\n').slice(1); // Pehli row chhoda

            allData = rows.map(row => {
                const cols = row.split(',');
                return {
                    q: cols[0], a: cols[1], b: cols[2], c: cols[3], d: cols[4], ans: cols[5]?.trim().toLowerCase(), sub: cols[6]?.trim()
                };
            }).filter(item => item.q);

            document.getElementById('load-status').innerText = "All Questions Updated!";
            renderSubjects();
        } catch (e) {
            document.getElementById('load-status').innerText = "Sheet Link Check Karein!";
        }
    }

    function renderSubjects() {
        const subjects = [...new Set(allData.map(item => item.sub))];
        const menu = document.getElementById('subject-menu');
        menu.innerHTML = subjects.map(s => `<button class="sub-btn" onclick="startQuiz('${s}')">${s}</button>`).join('');
    }

    function startQuiz(sub) {
        const name = prompt("Apna Naam:");
        if(!name) return;
        currentQuestions = allData.filter(item => item.sub === sub).sort(() => Math.random() - 0.5);
        document.getElementById('home').style.display = 'none';
        document.getElementById('quiz-box').style.display = 'block';
        showQ();
    }

    function showQ() {
        const q = currentQuestions[qIdx];
        if(!q) return alert("Quiz Khatam! Score: " + score) || location.reload();

        document.getElementById('q-text').innerText = q.q;
        const list = document.getElementById('opt-list');
        list.innerHTML = `
            <li onclick="check('a')">${q.a}</li>
            <li onclick="check('b')">${q.b}</li>
            <li onclick="check('c')">${q.c}</li>
            <li onclick="check('d')">${q.d}</li>
        `;
    }

    function check(choice) {
        if(choice === currentQuestions[qIdx].ans) score++;
        document.getElementById('score').innerText = score;
        qIdx++;
        showQ();
    }

    loadSheetData();
</script>
</body>
</html>
